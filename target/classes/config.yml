config-version: 2

save:
  sql:
    url: your url
    user: user
    password: password
    table: qcpet

player:
  max-display-count: 3

pet:
  tutorial:
    enabled: true
    reminder-interval-seconds: 300
  rename:
    max-length: 32
    allow-color-codes: true
    invalid-pattern: "[\\r\\n\\t]"
  bath:
    interval-hours: 24
  feed:
    min-times-per-day: 3
    max-times-per-day: 5

default:
  type: BEE
  displayName: "%qcpet_key%"
  rarity: "&a稀有"
  rideable: true
  waterFloat: false
  flyable: false
  autoTravelDefendOwner: false
  movable: true
  movementMultiplier: 1.0
  backpackMaxSlots: 54
  modelId: ""
  times: 1
  saveEntityData: false
  scaleRequirement: "1 + (%2% * 0.03)"
  expPerMinute: 15
  bathRewardExp: 25
  feedRewardExp: 15
  levelExpRequirement: "100 + (%1% * 25)"
  metaData: {}
  events:
    on-give:
      - "[message] &6你获得了宠物 &e%qcpet_key% &7(#%qcpet_id%)"
    on-spawn:
      - "[message] &e宠物 &r%qcpet_name% &e已出战"
    on-hide:
      - "[message] &7宠物 &r%qcpet_name% &7已收起"
    on-join-show:
      - "[message] &b%qcpet_name% &b欢迎主人回来"
    on-bath:
      - "[message] &b%qcpet_name% &b洗香香了，当前经验 &e%qcpet_exp%"
    on-feed:
      - "[message] &a%qcpet_name% &a吃饱了"
    on-rename:
      - "[message] &d宠物已重命名为 &r%qcpet_name%"
    on-add-exp:
      - "[message] &6宠物经验变更，当前 &e%qcpet_exp%"
    on-add-level:
      - "[message] &6宠物等级变更，当前 &e%qcpet_level%"
    on-damage:
      - "[message] &c%qcpet_name% &c受到了攻击"
  blindBoxEvents:
    on-give:
      - "[message] &6你获得了一只盲盒宠物 &7(#%qcpet_id%)"
    on-spawn:
      - "[message] &e你的盲盒宠物已出战，升到 1 级后将揭晓真实形态"
    on-hide:
      - "[message] &7盲盒宠物已收起"
    on-join-show:
      - "[message] &b你的盲盒宠物在等你回来"
    on-add-exp:
      - "[message] &6盲盒宠物当前经验: &e%qcpet_exp%"
    on-add-level:
      - "[message] &6盲盒宠物当前等级: &e%qcpet_level%"
    on-damage:
      - "[message] &c盲盒宠物受到了攻击"

defaultAdd:
  +displayName: "★%qcpet_owner_name% 的"
  displayName+: " &r★"
  times*: 1
  times+: 0
  metaData:
    isBaby: true
    angry: false
    bathNeedPrefix: ""
    bathNeedSuffix: " 🛁"
    feedNeedPrefix: ""
    feedNeedSuffix: " 🍝"


name: QcPet
version: '${project.version}'
main: org.bxwbb.qcpet.QcPet
api-version: '1.21'
author: BXWBB
description: 一个高度可配置的跨服宠物插件
website: https://github.com/bxwbb/QcPet

commands:
  qcpet:
    description: QcPet main command
    usage: /<command> [help|list|select|show [player] <id|*>|hide [player] <id|*>|bath|feed|info|reload|give [player] <pet>|remove [player] <id>|addexp [player] <id> <amount>|addlevel [player] <id> <amount>|storage]
    aliases:
      - pet
      - pets
    permission: qcpet.command
    permission-message: 你没有权限使用这个命令。

permissions:
  qcpet.*:
    description: 授予 QcPet 的全部权限。
    default: op
    children:
      qcpet.user: true
      qcpet.admin: true

  qcpet.user:
    description: 授予普通玩家宠物功能权限。
    default: true
    children:
      qcpet.command: true
      qcpet.command.help: true
      qcpet.command.list: true
      qcpet.command.select: true
      qcpet.command.show: true
      qcpet.command.hide: true
      qcpet.command.bath: true
      qcpet.command.feed: true
      qcpet.command.info: true

  qcpet.admin:
    description: 授予 QcPet 管理权限。
    default: op
    children:
      qcpet.user: true
      qcpet.command.reload: true
      qcpet.command.give: true
      qcpet.command.remove: true
      qcpet.command.addexp: true
      qcpet.command.addlevel: true
      qcpet.command.storage: true
      qcpet.command.show.other: true
      qcpet.command.hide.other: true
      qcpet.bypass.limit: true
      qcpet.bypass.world: true

  qcpet.command:
    description: 允许使用 /qcpet 基础命令。
    default: true

  qcpet.command.help:
    description: 允许查看 QcPet 命令帮助。
    default: true

  qcpet.command.list:
    description: 允许查看自己的宠物列表。
    default: true

  qcpet.command.select:
    description: 允许选择当前启用的宠物。
    default: true

  qcpet.command.show:
    description: 允许显示自己的宠物。
    default: true

  qcpet.command.show.other:
    description: 允许显示其他玩家的宠物。
    default: op

  qcpet.command.hide:
    description: 允许隐藏自己的宠物。
    default: true

  qcpet.command.hide.other:
    description: 允许隐藏其他玩家的宠物。
    default: op

  qcpet.command.bath:
    description: 允许给宠物洗澡。
    default: true

  qcpet.command.feed:
    description: 允许给宠物喂食。
    default: true

  qcpet.command.info:
    description: 允许查看宠物信息。
    default: true

  qcpet.command.reload:
    description: 允许重载 QcPet 配置。
    default: op

  qcpet.command.give:
    description: 允许向玩家发放宠物。
    default: op

  qcpet.command.remove:
    description: 允许移除玩家的宠物。
    default: op

  qcpet.command.addexp:
    description: 允许给宠物增加经验。
    default: op

  qcpet.command.addlevel:
    description: 允许给宠物增加等级。
    default: op

  qcpet.command.storage:
    description: 允许查看存储状态。
    default: op

  qcpet.bypass.limit:
    description: 绕过配置中的宠物数量限制。
    default: op

  qcpet.bypass.world:
    description: 绕过配置中的世界限制。
    default: op

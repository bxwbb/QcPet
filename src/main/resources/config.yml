config-version: 2

save:
  sql:
    url: your url
    user: user
    password: password
    table: qcpet

player:
  max-display-count: 1

pet:
  ride:
    ground-speed: 0.55
    flying-speed: 0.45
    flying-vertical-speed: 0.2
    flying-glide-factor: 0.35
    flying-max-height: 5.0
  tutorial:
    enabled: true
    reminder-interval-seconds: 300
  rename:
    max-length: 32
    allow-color-codes: true
    invalid-pattern: "[\\r\\n\\t]"
  bath:
    interval-hours: 24
  feed:
    min-times-per-day: 3
    max-times-per-day: 5
  backpack:
    base-slots: 9
    slots-per-level: 1
